name: Midday Check (12:00 PM CT)

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 17:00 UTC = 12:00 PM CDT (UTC-5)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests yfinance discord.py

      - name: Run midday routine
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_USER_ID:     ${{ secrets.DISCORD_USER_ID }}
        run: python runner.py midday

      - name: Commit updated memory files
        run: |
          git config user.name  "Trading Bot 🤖"
          git config user.email "bot@trading-ai"
          git add memory/ strategy/ config/
          git diff --staged --quiet || git commit -m "☀️ midday — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
